name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  backend-lint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - name: Install dependencies
        run: |
          cd backend
          pip install ruff
      - name: Lint
        run: |
          cd backend
          ruff check app/

  backend-test:
    runs-on: ubuntu-latest
    services:
      postgres:
        image: timescale/timescaledb-ha:pg16
        env:
          POSTGRES_USER: rubinscout
          POSTGRES_PASSWORD: rubinscout
          POSTGRES_DB: rubinscout_test
        ports:
          - 5432:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - name: Install dependencies
        run: |
          cd backend
          pip install -r requirements.txt
      - name: Run migrations
        env:
          DATABASE_URL: postgresql://rubinscout:rubinscout@localhost:5432/rubinscout_test
        run: |
          cd backend
          alembic upgrade head
      - name: Run tests
        env:
          DATABASE_URL: postgresql://rubinscout:rubinscout@localhost:5432/rubinscout_test
          APP_ENV: test
        run: |
          cd backend
          python -m pytest tests/ -v

  frontend-build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "20"
      - name: Install dependencies
        run: |
          cd frontend
          npm ci
      - name: Build
        run: |
          cd frontend
          npm run build